name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  run-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install test dependencies
        run: uv pip install --system -e . --group tests

      - name: Run Unit Tests
        run: uv run pytest -v tests/unit

      - name: Run Integration Tests
        run: uv run pytest -v tests/integration

      - name: Run E2E tests for whisper (MMS is too big)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: uv run pytest -v tests/e2e/test_finetune_whisper.py
